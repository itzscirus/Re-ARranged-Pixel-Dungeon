actors.hero.heroclass.necromancer=necromancer
actors.hero.heroclass.necromancer_desc_short=The Necromancer wields a staff to channel _forbidden arcana_, siphoning souls and raising minions. Starts with a _mage’s staff_ and focuses on _dark magic_.
actors.hero.heroclass.necromancer_desc=The Necromancer starts with a _unique staff_, which recharges significantly faster than a wand and has 1 more charge. He turns arcane knowledge toward forbidden arts: siphoning life and commanding the dead.\n\nThe Necromancer also starts with a _wand of magic missile_ imbued in his staff, cloth armor, a waterskin, and a velvet pouch.\n\nThe Necromancer automatically identifies:\n_-_ Scrolls of Identify\n_-_ Potions of Liquid Flame\n_-_ Scrolls of Upgrade
actors.hero.heroclass.necromancer_unlock=The Necromancer is automatically unlocked.


